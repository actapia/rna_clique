name: rna-clique
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python>=3.12
  - pip
  - tqdm
  - pandas
  - joblib>=1.3.2
  - networkx
  - matplotlib
  - seaborn
  - scikit-bio
  - pytables
  - biopython
  - more-itertools
  - dendropy
  - pyyaml
  - adjusttext
  - numpy
  - psutil
  - sympy
  - pysam
  - pip:
      - nice-colorsys
      - simple-blast>=0.7.9
      - python-sat[aiger,approxmc,cryptosat,pblib]
      - pyblast4_archive
      - name_conflict_resolver
      # For simulator:
      - multiset-key-dict
  # For simulator:
  - scipy
