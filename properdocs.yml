site_name: RNA-clique user guide
repo_url: https://github.com/actapia/rna_clique
nav:
    - Home: index.md
    - Command-line usage: usage.md
    - Configuration files: config.md
    - File formats: formats.md
    - Installation guides:
        - Ubuntu: installation_guides/ubuntu.md
        - macOS: installation_guides/macos.md
        - General:
            - Requirements: requirements.md
            - Testing installation: testing_installation.md
    - Tutorials:
        - tutorials/reads2tree/README.md
        - tutorials/subsets/README.md
        - tutorials/export_and_search/README.md
        - Non-SPAdes data:
            - tutorials/nonspades/README.md
            - tutorials/nonspades/trinity_assembly.md
    - API:
        - api/README.md
        - api/visualization.md        
plugins:
  - mike:
      canonical_version: 'latest'
      version_selector: true
  - search
  - macros:
     module_name: mkdocs_functions
markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
extra_css:
  - stylesheets/style.css
theme:
    name: material
    features:
        - content.code.copy
extra:
  version:
    provider: mike
    alias: true
