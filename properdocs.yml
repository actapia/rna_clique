site_name: RNA-clique user guide
repo_url: https://github.com/actapia/rna_clique
nav:
    - Home: index.md
    - Command-line usage: usage.md
    - Configuration files: config.md
    - File formats: formats.md
    - Installation guides:
        - Ubuntu: installation_guides/ubuntu.md
        - macOS: installation_guides/macos.md
        - General:
            - Requirements: requirements.md
            - Testing installation: testing_installation.md
            - building.md
    - Tutorials:
        - From RNA-seq reads to a phylogenetic tree with RNA-clique: tutorials/reads2tree/README.md
        - tutorials/subsets/README.md
        - tutorials/export_and_search/README.md
        - Non-SPAdes data:
            - Using RNA-clique with non-SPAdes data: tutorials/nonspades/README.md
            - tutorials/nonspades/trinity_assembly.md
    - API:
        - Getting started: api/README.md
        - api/visualization.md   
        - API Reference: api/autoapi/     
plugins:
  - mike:
      canonical_version: 'latest'
      version_selector: true
  - search
  - mkdocs-autoapi:
        autoapi_dir: src
        autoapi_root: api/autoapi
        autoapi_add_nav_entry: False
        autoapi_ignore:
            - '**/app.py'
            - '**/docs/**'
  - mkdocstrings:
        handlers:
            python:
                paths: [src]
                options:
                    docstring_options:
                        warnings: False
  - macros:
     module_name: mkdocs_functions
markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
extra_css:
  - stylesheets/style.css
theme:
    name: material
    features:
        - content.code.copy
extra:
  version:
    provider: mike
    alias: true
